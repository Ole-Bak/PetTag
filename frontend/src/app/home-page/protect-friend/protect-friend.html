<section class="py-20 md:py-28 bg-[#FFF8F1] overflow-hidden">
  <div class="container mx-auto px-4 md:px-0 text-center">
    <h2 class="text-3xl md:text-4xl font-bold text-[#3D2B1F] mb-6 tracking-tight">
      Ready to protect your best friend?
    </h2>

    <p class="text-lg md:text-xl text-[#8B7E74] mb-10 max-w-2xl mx-auto leading-relaxed">
      Join thousands of responsible pet owners today.
    </p>

    <a
      routerLink="/login"
      [queryParams]="{ mode: 'register' }"
      class="inline-block bg-[#FF9D52] hover:bg-[#E88B42] text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg shadow-[#FF9D52]/20 transition-all duration-300 ease-out hover:-translate-y-1 hover:shadow-xl hover:shadow-[#FF9D52]/40 active:translate-y-0 cursor-pointer"
    >
      Create Free Account
    </a>
  </div>
</section>
