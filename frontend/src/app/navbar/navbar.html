<header class="px-4 fixed top-0 z-50 w-full border-b border-b-transparent shadow-sm bg-[#fff8f0]">
  <nav class="flex items-center justify-between py-4 container mx-auto">
    <a
      routerLink="/"
      class="flex items-center gap-2 text-2xl font-black tracking-tight text-[#FF8C42]"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="text-[#FF8C42]"
      >
        <circle cx="11" cy="4" r="2"></circle>
        <circle cx="18" cy="8" r="2"></circle>
        <circle cx="20" cy="16" r="2"></circle>
        <path
          d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"
        ></path>
      </svg>
      PetTag
    </a>

    <div class="hidden md:flex items-center gap-10">
      @if (!auth.isLoggedIn()) {
        <div class="flex items-center gap-8">
          <a routerLink="/" class="text-[#7A6556] hover:text-[#FF8C42] font-bold transition-colors"
            >Home</a
          >
          <a
            routerLink="/about"
            class="text-[#7A6556] hover:text-[#FF8C42] font-bold transition-colors"
            >About Us</a
          >
          <a
            routerLink="/contact"
            class="text-[#7A6556] hover:text-[#FF8C42] font-bold transition-colors"
            >Contact</a
          >
        </div>

        <button
          routerLink="/login"
          class="bg-[#FF8C42] hover:bg-[#e67a35] text-white px-7 py-2 rounded-[24px] font-bold transition-all duration-300 shadow-md active:scale-95 hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(249,231,132,0.8)]"
        >
          Login / Register
        </button>
      } @else {
        <div class="flex items-center gap-8">
          <a routerLink="/dashboard" class="text-[#7A6556] hover:text-[#FF8C42] font-bold"
            >My Tags</a
          >
          <a routerLink="/add-tag" class="text-[#7A6556] hover:text-[#FF8C42] font-bold">Add Tag</a>
          <a
            [routerLink]="['/pet', petService.pets[3]?.id]"
            class="text-[#7A6556] hover:text-[#FF8C42] font-bold"
            >Profile</a
          >
        </div>

        <button
          (click)="handleLogout()"
          class="border-2 border-[#FF8C42] text-[#FF8C42] px-7 py-2 rounded-[24px] font-bold transition-all hover:bg-[#FF8C42] hover:text-white"
        >
          Logout
        </button>
      }
    </div>

    <button
      (click)="toggleMenu()"
      class="md:hidden p-2 text-[#3D2B1F] hover:bg-[#FFF8F0] rounded-xl transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="30"
        height="30"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        @if (!isMenuOpen) {
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        } @else {
          <path d="M18 6L6 18M6 6l12 12"></path>
        }
      </svg>
    </button>
  </nav>
</header>
@if (isMenuOpen) {
  <div
    class="md:hidden bg-white fixed top-[72px] left-0 w-full z-40 border-t border-[#E8DCCB] px-4 py-6 flex flex-col gap-5 rounded-b-[32px] shadow-[0_0px_10px_5px_rgba(0,0,0,0.1)]"
  >
    @if (!auth.isLoggedIn()) {
      <a routerLink="/" (click)="isMenuOpen = false" class="text-lg font-bold text-[#7A6556]"
        >Home</a
      >
      <hr class="border-[#E8DCCB]" />
      <a routerLink="/about" (click)="isMenuOpen = false" class="text-lg font-bold text-[#7A6556]"
        >About Us</a
      >
      <hr class="border-[#E8DCCB]" />
      <a routerLink="/contact" (click)="isMenuOpen = false" class="text-lg font-bold text-[#7A6556]"
        >Contact</a
      >
      <hr class="border-[#E8DCCB]" />
      <button
        routerLink="/login"
        (click)="isMenuOpen = false"
        class="bg-[#FF8C42] text-white shadow-[0_10px_20px_rgba(249,231,132,0.8)] px-6 py-2 rounded-4xl font-black w-full text-center"
      >
        Login / Register
      </button>
    } @else {
      <a
        routerLink="/dashboard"
        (click)="isMenuOpen = false"
        class="text-lg font-bold text-[#7A6556]"
        >My Tags</a
      >
      <a routerLink="/add-tag" (click)="isMenuOpen = false" class="text-lg font-bold text-[#7A6556]"
        >Add Tag</a
      >

      @if (petService.pets.length > 0) {
        <a
          [routerLink]="['/pet', petService.pets[0].id]"
          (click)="isMenuOpen = false"
          class="text-lg font-bold text-[#7A6556]"
        >
          Profile
        </a>
      }

      <button
        (click)="handleLogout(); isMenuOpen = false"
        class="border-2 border-[#FF8C42] text-[#FF8C42] px-7 py-3 rounded-[24px] font-bold"
      >
        Logout
      </button>
    }
  </div>
}
