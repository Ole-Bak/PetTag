<section class="py-[120px] bg-[#FCF8F1]">
  <div class="container mx-auto px-4 md:px-0">
    <div class="text-center max-w-[800px] mx-auto mb-12">
      <h1 class="text-4xl md:text-4xl font-bold text-[#3D2B1F] mb-4">Get in Touch</h1>
      <p class="text-md text-[#8B7E74]">Have questions about PetTag? We're here to help.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 max-w-[1000px] mx-auto gap-10">
      <div
        class="p-8 rounded-3xl bg-white transition-transform duration-300 hover:-translate-y-2 shadow-lg hover:shadow-xl"
        style="
          background-image: url(&quot;data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2C9.243 2 7 4.243 7 7C7 9.757 9.243 12 12 12C14.757 12 17 9.757 17 7C17 4.243 14.757 2 12 2ZM5.5 10C3.567 10 2 11.567 2 13.5C2 15.433 3.567 17 5.5 17C7.433 17 9 15.433 9 13.5C9 11.567 7.433 10 5.5 10ZM18.5 10C16.567 10 15 11.567 15 13.5C15 15.433 16.567 17 18.5 17C20.433 17 22 15.433 22 13.5C22 11.567 20.433 10 18.5 10ZM12 14C8.686 14 6 16.686 6 20V22H18V20C18 16.686 15.314 14 12 14Z' fill='%233D2B1F' opacity='0.03'/%3E%3C/svg%3E&quot;);
          background-repeat: repeat;
          background-size: 24px;
        "
      >
        <h3 class="text-2xl font-bold text-[#3D2B1F] mb-6">Send us a message</h3>
        <form class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-[#3D2B1F] mb-1">Name</label>
            <input
              type="text"
              class="w-full px-4 py-3 rounded-xl border-2 border-[#E8DCCB] outline-none bg-white transition-all focus:border-[#FF9D52] focus:ring-4 focus:ring-[#FF9D52]/10"
              placeholder="John Doe"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3D2B1F] mb-1">Email</label>
            <input
              type="email"
              class="w-full px-4 py-3 rounded-xl border-2 border-[#E8DCCB] outline-none bg-white transition-all focus:border-[#FF9D52] focus:ring-4 focus:ring-[#FF9D52]/10"
              placeholder="john@example.com"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3D2B1F] mb-1">Subject</label>
            <input
              type="text"
              class="w-full px-4 py-3 rounded-xl border-2 border-[#E8DCCB] outline-none bg-white transition-all focus:border-[#FF9D52] focus:ring-4 focus:ring-[#FF9D52]/10"
              placeholder="How can we help?"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3D2B1F] mb-1">Message</label>
            <textarea
              rows="4"
              class="w-full px-4 py-3 rounded-xl border-2 border-[#E8DCCB] bg-white outline-none resize-none transition-all focus:border-[#FF9D52] focus:ring-4 focus:ring-[#FF9D52]/10"
              placeholder="Your message here..."
              required
            ></textarea>
          </div>
          <button
            type="submit"
            class="w-full bg-[#FF9D52] text-white font-semibold py-4 rounded-[50px] shadow-lg transition-transform hover:-translate-y-1"
          >
            Send Message
          </button>
        </form>
      </div>

      <div class="flex flex-col gap-6">
        <div
          class="p-8 rounded-3xl bg-white transition-transform duration-300 hover:-translate-y-2 shadow-lg hover:shadow-xl"
          style="
            background-image: url(&quot;data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2C9.243 2 7 4.243 7 7C7 9.757 9.243 12 12 12C14.757 12 17 9.757 17 7C17 4.243 14.757 2 12 2ZM5.5 10C3.567 10 2 11.567 2 13.5C2 15.433 3.567 17 5.5 17C7.433 17 9 15.433 9 13.5C9 11.567 7.433 10 5.5 10ZM18.5 10C16.567 10 15 11.567 15 13.5C15 15.433 16.567 17 18.5 17C20.433 17 22 15.433 22 13.5C22 11.567 20.433 10 18.5 10ZM12 14C8.686 14 6 16.686 6 20V22H18V20C18 16.686 15.314 14 12 14Z' fill='%233D2B1F' opacity='0.03'/%3E%3C/svg%3E&quot;);
            background-repeat: repeat;
            background-size: 24px;
          "
        >
          <h3 class="text-xl font-bold text-[#3D2B1F] mb-6">Contact Info</h3>
          <ul class="space-y-4 text-[#8B7E74]">
            <li class="flex items-start gap-4">
              <span class="text-[#FF9D52]">📍</span>
              <span>ul. Zwierzęca 12, 00-001 Warszawa, Polska</span>
            </li>
            <li class="flex items-start gap-4">
              <span class="text-[#FF9D52]">✉️</span>
              <span>kontakt@pettag.pl</span>
            </li>
            <li class="flex items-start gap-4">
              <span class="text-[#FF9D52]">📞</span>
              <span>+48 123 456 789</span>
            </li>
          </ul>
        </div>

        <div
          class="h-[250px] rounded-3xl bg-[#e0e0e0] flex flex-col items-center justify-center text-[#8B7E74] transition-transform duration-300 hover:-translate-y-2 shadow-lg hover:shadow-xl"
          style="
            background-image: url(&quot;data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2C9.243 2 7 4.243 7 7C7 9.757 9.243 12 12 12C14.757 12 17 9.757 17 7C17 4.243 14.757 2 12 2ZM5.5 10C3.567 10 2 11.567 2 13.5C2 15.433 3.567 17 5.5 17C7.433 17 9 15.433 9 13.5C9 11.567 7.433 10 5.5 10ZM18.5 10C16.567 10 15 11.567 15 13.5C15 15.433 16.567 17 18.5 17C20.433 17 22 15.433 22 13.5C22 11.567 20.433 10 18.5 10ZM12 14C8.686 14 6 16.686 6 20V22H18V20C18 16.686 15.314 14 12 14Z' fill='%233D2B1F' opacity='0.03'/%3E%3C/svg%3E&quot;);
            background-repeat: repeat;
            background-size: 24px;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            data-lucide="map"
            aria-hidden="true"
            size="48"
            color="var(--text-light)"
            style="margin-bottom: 8px"
            class="lucide lucide-map"
          >
            <path
              d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"
            ></path>
            <path d="M15 5.764v15"></path>
            <path d="M9 3.236v15"></path>
          </svg>
          <p class="font-bold uppercase tracking-wider text-xs">Interactive Map Placeholder</p>
        </div>
      </div>
    </div>
  </div>
</section>
